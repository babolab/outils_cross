            { name: "Port de Fécamp", lat: 49.761667, lon: 0.3675 },
            { name: "Cherbourg Cité de la Mer", lat: 49.647778, lon: -1.619444 }
        ];

        // Sélectionner 20 points aléatoires
        const selectedPoints = [...allPoints]
            .sort(() => Math.random() - 0.5)
            .slice(0, 20);

        // Initialisation
        let currentQuestion = 0;
        let totalScore = 0;
        let currentPoint = null;
        let userMarker = null;
        let correctMarker = null;
        let polyline = null;

        // Vue initiale de la carte
        const initialView = { center: [49.3, -1.0], zoom: 9 };

        // Carte centrée sur la Manche SANS CONTRÔLES DE ZOOM
        const map = L.map('map', {
            zoomControl: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            touchZoom: false,
            boxZoom: false,
            keyboard: false,
            dragging: true
        }).setView(initialView.center, initialView.zoom);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        function resetMapView() {
            map.setView(initialView.center, initialView.zoom);
        }

        function startQuestion() {
            if (currentQuestion >= 20) {
                showFinalScore();
                return;
            }

            currentPoint = selectedPoints[currentQuestion];
            document.getElementById('stationName').textContent = currentPoint.name;
            document.getElementById('current').textContent = currentQuestion + 1;
            document.getElementById('feedback').innerHTML = '';

            // Nettoyer la carte
            if (userMarker) map.removeLayer(userMarker);
            if (correctMarker) map.removeLayer(correctMarker);
            if (polyline) map.removeLayer(polyline);

            // Retour au zoom initial
            resetMapView();

            // Attendre le clic
            map.once('click', handleGuess);
        }

        function handleGuess(e) {
            const userLat = e.latlng.lat;
            const userLon = e.latlng.lng;

            // Placer le marqueur utilisateur
            userMarker = L.circleMarker([userLat, userLon], {
                radius: 8,
                fillColor: '#dc3545',
                color: 'white',
                weight: 2,
                fillOpacity: 1
            }).addTo(map);

            // Placer le marqueur correct
            correctMarker = L.circleMarker([currentPoint.lat, currentPoint.lon], {
                radius: 8,
                fillColor: '#28a745',
                color: 'white',
                weight: 2,
                fillOpacity: 1
            }).addTo(map);

            // Ligne entre les deux
            polyline = L.polyline([
                [userLat, userLon],
                [currentPoint.lat, currentPoint.lon]
            ], {
                color: '#666',
                weight: 2,
                dashArray: '5, 10'
            }).addTo(map);

            // Calculer la distance en km
            const distance = map.distance(
                [userLat, userLon],
                [currentPoint.lat, currentPoint.lon]
            ) / 1000;

            // Calculer le score (système dégressif)
            let points = 0;
            let feedback = '';
            let className = '';

            if (distance < 2) {
                points = 1;
                feedback = `Excellent ! Distance: ${distance.toFixed(1)} km`;
                className = 'excellent';
            } else if (distance < 5) {
                points = 0.8;
                feedback = `Très bon ! Distance: ${distance.toFixed(1)} km`;
                className = 'excellent';
            } else if (distance < 10) {
                points = 0.6;
                feedback = `Bon ! Distance: ${distance.toFixed(1)} km`;
                className = 'bon';
            } else if (distance < 20) {
                points = 0.4;
                feedback = `Moyen. Distance: ${distance.toFixed(1)} km`;
                className = 'moyen';
            } else if (distance < 40) {
                points = 0.2;
                feedback = `Loin. Distance: ${distance.toFixed(1)} km`;
                className = 'faible';
            } else {
                points = 0;
                feedback = `Trop loin ! Distance: ${distance.toFixed(1)} km`;
                className = 'faible';
            }

            totalScore += points;
            document.getElementById('score').textContent = totalScore.toFixed(1);

            const resultDiv = document.createElement('div');
            resultDiv.className = `result ${className}`;
            resultDiv.innerHTML = `${feedback} - Points: ${points.toFixed(1)}/1`;
            document.getElementById('feedback').appendChild(resultDiv);

            const nextBtn = document.createElement('button');
            nextBtn.textContent = currentQuestion < 19 ? 'Question suivante' : 'Voir le résultat final';
            nextBtn.onclick = () => {
                currentQuestion++;
                startQuestion();
            };
            document.getElementById('feedback').appendChild(nextBtn);
        }

        function showFinalScore() {
            const note = totalScore.toFixed(1);
            let appreciation = '';
            if (note >= 18) appreciation = '🏆 Capitaine au long cours !';
            else if (note >= 15) appreciation = '⚓ Excellent navigateur !';
            else if (note >= 12) appreciation = '🧭 Bon marin !';
            else if (note >= 9) appreciation = '⛵ Mousse confirmé !';
            else appreciation = '🌊 À réviser la navigation...';

            document.getElementById('sidebar').innerHTML = `
                <div id="finalScore">
                    <h2>Quizz terminé !</h2>
                    <p>Votre score final : ${note}/20</p>
                    <p>${appreciation}</p>
                    <button onclick="location.reload()">Nouveau Quizzz</button>
                </div>
            `;

            // Afficher tous les points du Quizzz sur la carte
            selectedPoints.forEach(point => {
                L.circleMarker([point.lat, point.lon], {
                    radius: 6,
                    fillColor: '#003d82',
                    color: 'white',
                    weight: 2,
                    fillOpacity: 0.8
                }).bindPopup(point.name).addTo(map);
            });

            map.fitBounds(selectedPoints.map(p => [p.lat, p.lon]));
        }

        // Démarrer le Quizzz
        startQuestion();
    </script>
