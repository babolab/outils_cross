<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz SNSM — CROSS Jobourg</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a2332;
    --bg2: #243044;
    --bg3: #2e3d56;
    --text: #e8edf4;
    --text2: #a0b0c8;
    --orange: #f0a500;
    --blue: #3a7bd5;
    --green: #2ecc71;
    --red: #e74c3c;
    --border: #3a4f6e;
    --radius: 10px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 16px; }
  #app { min-height: 100vh; display: flex; flex-direction: column; }

  /* --- HEADER --- */
  .header { background: var(--bg2); border-bottom: 2px solid var(--orange); padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
  .header-logo { font-size: 1.4rem; font-weight: 700; color: var(--orange); letter-spacing: 1px; }
  .header-sub { font-size: 0.85rem; color: var(--text2); }
  .btn-home { margin-left: auto; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 0.9rem; transition: background 0.15s; }
  .btn-home:hover { background: var(--blue); }

  /* --- HOME --- */
  .home-content { flex: 1; padding: 40px 20px; max-width: 960px; margin: 0 auto; width: 100%; }
  .home-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
  .home-desc { color: var(--text2); margin-bottom: 36px; font-size: 0.95rem; }
  .quiz-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
  .quiz-card { background: var(--bg2); border: 2px solid var(--border); border-radius: var(--radius); padding: 28px 24px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
  .quiz-card:hover { border-color: var(--blue); transform: translateY(-2px); }
  .quiz-card-num { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; color: var(--orange); text-transform: uppercase; margin-bottom: 10px; }
  .quiz-card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
  .quiz-card-desc { color: var(--text2); font-size: 0.9rem; line-height: 1.5; margin-bottom: 16px; }
  .quiz-card-meta { display: flex; flex-direction: column; gap: 4px; }
  .quiz-card-meta span { font-size: 0.82rem; color: var(--text2); }
  .quiz-card-meta strong { color: var(--text); }

  /* --- INTRO --- */
  .intro-content { flex: 1; padding: 40px 20px; max-width: 700px; margin: 0 auto; width: 100%; }
  .intro-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; }
  .intro-body { color: var(--text2); line-height: 1.7; margin-bottom: 32px; }
  .intro-body ul { padding-left: 20px; }
  .intro-body li { margin-bottom: 6px; }
  .btn-start { background: var(--blue); color: #fff; border: none; padding: 14px 36px; border-radius: var(--radius); font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-start:hover { background: #2d62b8; }

  /* --- QUIZ PLAY LAYOUT --- */
  .play-layout { flex: 1; display: flex; flex-direction: column; }
  .play-topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .play-progress { font-size: 0.9rem; color: var(--text2); }
  .play-progress strong { color: var(--text); }
  .play-score-display { font-size: 0.9rem; color: var(--text2); }
  .play-score-display strong { color: var(--orange); }

  /* Timer bar */
  .timer-wrap { flex: 1; min-width: 120px; }
  .timer-label { font-size: 0.78rem; color: var(--text2); margin-bottom: 3px; }
  .timer-bar-bg { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .timer-bar-fill { height: 100%; width: 100%; border-radius: 4px; transition: width 0.1s linear, background-color 0.1s linear; }

  /* --- QUESTION AREA --- */
  .question-area { flex: 1; padding: 24px 20px; max-width: 900px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 20px; }
  .question-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .question-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); margin-bottom: 12px; }
  .question-text { font-size: 1.15rem; font-weight: 600; line-height: 1.5; }
  .question-hint { font-size: 0.85rem; color: var(--text2); margin-top: 8px; }

  /* Answer input */
  .answer-wrap { display: flex; gap: 12px; flex-wrap: wrap; }
  .answer-input { background: var(--bg3); border: 2px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 12px 16px; font-size: 1.2rem; flex: 1; min-width: 140px; outline: none; transition: border-color 0.15s; }
  .answer-input:focus { border-color: var(--blue); }
  .answer-input.correct { border-color: var(--green); }
  .answer-input.wrong { border-color: var(--red); }
  .btn-validate { background: var(--blue); color: #fff; border: none; padding: 12px 28px; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .btn-validate:hover { background: #2d62b8; }
  .btn-validate:disabled { background: var(--bg3); color: var(--text2); cursor: not-allowed; }

  /* QCM choices */
  .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn { background: var(--bg3); border: 2px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 14px 18px; font-size: 0.95rem; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; }
  .choice-btn:hover:not(:disabled) { border-color: var(--blue); background: var(--bg2); }
  .choice-btn.correct { border-color: var(--green); background: rgba(46,204,113,0.12); }
  .choice-btn.wrong { border-color: var(--red); background: rgba(231,76,60,0.12); }
  .choice-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback-card { background: var(--bg2); border-radius: var(--radius); padding: 20px 24px; border-left: 4px solid var(--green); }
  .feedback-card.wrong { border-left-color: var(--red); }
  .feedback-title { font-weight: 700; font-size: 1rem; margin-bottom: 8px; }
  .feedback-title.correct-text { color: var(--green); }
  .feedback-title.wrong-text { color: var(--red); }
  .feedback-body { color: var(--text2); font-size: 0.9rem; line-height: 1.6; }
  .feedback-score { font-size: 1rem; font-weight: 700; color: var(--orange); margin-top: 8px; }
  .btn-next { background: var(--orange); color: #1a2332; border: none; padding: 12px 30px; border-radius: var(--radius); font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 12px; transition: background 0.15s; }
  .btn-next:hover { background: #d9950a; }

  /* --- MAP QUIZ LAYOUT --- */
  .map-play-layout { flex: 1; display: flex; flex-direction: column; }
  .map-question-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 20px; }
  .map-question-text { font-size: 1.05rem; font-weight: 600; margin-bottom: 8px; }
  .map-hint { font-size: 0.85rem; color: var(--text2); }
  #leaflet-map { flex: 1; min-height: 300px; height: 60vh; }
  .map-bottom { background: var(--bg2); border-top: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .map-click-info { color: var(--text2); font-size: 0.9rem; }

  /* Q3 input in map area */
  .q3-input-area { background: var(--bg2); border-top: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  /* --- RESULT --- */
  .result-content { flex: 1; padding: 40px 20px; max-width: 800px; margin: 0 auto; width: 100%; }
  .result-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
  .result-sub { color: var(--text2); margin-bottom: 28px; }
  .result-score-big { font-size: 3rem; font-weight: 700; color: var(--orange); margin-bottom: 4px; }
  .result-pct { font-size: 1.2rem; color: var(--text2); margin-bottom: 24px; }
  .result-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 32px; }
  .result-stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 22px; }
  .result-stat-value { font-size: 1.4rem; font-weight: 700; color: var(--blue); }
  .result-stat-label { font-size: 0.82rem; color: var(--text2); margin-top: 4px; }
  .result-table-wrap { overflow-x: auto; margin-bottom: 32px; }
  .result-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .result-table th { background: var(--bg3); color: var(--text2); padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
  .result-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table td.pts { font-weight: 700; color: var(--orange); }
  .result-table td.ok { color: var(--green); }
  .result-table td.ko { color: var(--red); }
  .result-btns { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-replay { background: var(--blue); color: #fff; border: none; padding: 13px 28px; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-replay:hover { background: #2d62b8; }
  .btn-back-home { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 13px 28px; border-radius: var(--radius); font-size: 1rem; cursor: pointer; transition: background 0.15s; }
  .btn-back-home:hover { background: var(--blue); border-color: var(--blue); }

  /* Utils */
  .hidden { display: none !important; }
  @media (max-width: 500px) {
    .choices-grid { grid-template-columns: 1fr; }
    .result-score-big { font-size: 2.2rem; }
  }
</style>
</head>

// ============================================================
// UTILS
// ============================================================
function normalizeSNS(v) {
  const digits = String(v || '').replace(/\D/g, '');
  const n = parseInt(digits, 10);
  return isNaN(n) ? '' : String(n);
}

function timeFactor(s) {
  if (s <= 5) return 1;
  if (s >= 15) return 0;
  // S-curve over [5, 15]: slow decay 5-8s, steep 8-12s, slow 12-15s
  const x = (s - 5) / 10;
  return 1 - (3 * x * x - 2 * x * x * x);
}

function geoScore(km) {
  if (km <= 1.5) return 1;
  if (km >= 5) return 0;
  // Quadratic ease-in: slow decay near 1.5 km, steeper near 5 km
  const t = (km - 1.5) / 3.5;
  return 1 - t * t;
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickN(arr, n) {
  return shuffle([...arr]).slice(0, n);
}

function formatScore(s) {
  return s.toFixed(2);
}

function startTimer() {
  stopTimer();
  appState.elapsed = 0;
  appState.timerInterval = setInterval(() => {
    appState.elapsed += 0.1;
    updateTimerBar();
  }, 100);
}

function stopTimer() {
  if (appState.timerInterval) {
    clearInterval(appState.timerInterval);
    appState.timerInterval = null;
  }
}

function updateTimerBar() {
  const bar = document.getElementById('timer-bar-fill');
  if (!bar) return;
  const pct = Math.max(0, 100 - (Math.max(0, appState.elapsed - 5) / 10) * 100);
  bar.style.width = pct + '%';
  const r = Math.round(231 + (46 - 231) * (pct / 100));
  const g = Math.round(76 + (204 - 76) * (pct / 100));
  bar.style.backgroundColor = `rgb(${r},${g},60)`;
}

function destroyMap() {

    appState.leafletMap.remove();

  appState.clickedLatLng = null;
  appState.clickMarker = null;

function createMap(containerId) {
  const map = L.map(containerId, {
    zoomControl: false,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    touchZoom: false,
    keyboard: false,
    boxZoom: false,
    minZoom: 9,
    maxZoom: 9,
    dragging: true,
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 9,
  }).addTo(map);
  // Defer fitBounds so the container has its final dimensions in the DOM
  setTimeout(() => {
    map.invalidateSize();
    map.fitBounds([[48.45, -2.25], [49.95, 0.85]]);
  }, 0);
  appState.leafletMap = map;
  return map;
}

// QUIZ 1 — BUILD QUESTIONS
// ============================================================
function buildQuiz1Questions() {
  const pool = shuffle([...SNS_DATA]);
  const typeA = pool.slice(0, 10);
  const typeB = pool.slice(10, 20);
  const allLieux = [...new Set(SNS_DATA.map(m => m.lieu))];

  const questions = [];

  for (const m of typeA) {
    questions.push({
      type: 'A',
      moyen: m,
      prompt: `Quelle est la station du moyen <strong>${m.numeroSNS}</strong>${m.nom ? ' (' + m.nom + ')' : ''} ?`,
      correctSNS: m.numeroSNS,
      correctLieu: m.lieu,
      // For type A: station shown, SNS entered — actually it's reversed:
      // type A: station → SNS
      // Let me re-read: Type A: "À partir du nom de la station, retrouver le numéro SNS"
      // so prompt = station name, answer = SNS number
    });
  }

  // Rebuild properly
  questions.length = 0;

  for (const m of typeA) {
    // Type A: show station (and name if available), enter SNS number
    const moyensStation = SNS_DATA.filter(x => x.lieu === m.lieu);
    questions.push({
      type: 'A',
      moyen: m,
      moyensStation,
      prompt: `Quel est le numéro SNS du moyen <strong>${m.nom || m.numeroSNS}</strong> de la station <strong>${m.lieu}</strong> ?`,
      promptStation: m.lieu,
      correctSNS: m.numeroSNS,
    });
  }

  for (const m of typeB) {
    // Type B: show SNS, choose station from 5
    const distractors = shuffle(allLieux.filter(l => l !== m.lieu)).slice(0, 4);
    const choices = shuffle([m.lieu, ...distractors]);
    questions.push({
      type: 'B',
      moyen: m,
      prompt: `À quelle station appartient le moyen <strong>${m.numeroSNS}</strong>${m.nom ? ' (' + m.nom + ')' : ''} ?`,
      choices,
      correct: m.lieu,
    });
  }

  return shuffle(questions);
}

function validateQ1A() {
  if (appState.answered) return;
  const inp = document.getElementById('sns-input');
  const val = inp ? inp.value.trim() : '';
  const q = appState.questions[appState.qIndex];
  const given = normalizeSNS(val);
  const correct = normalizeSNS(q.correctSNS);
  const isOk = given !== '' && given === correct;
  const elapsed = appState.elapsed;
  stopTimer();
  appState.answered = true;

  const pts = isOk ? timeFactor(elapsed) : 0;
  appState.score += pts;
  appState.history.push({
    label: q.prompt.replace(/<[^>]+>/g, ''),
    given: val || '(vide)',
    correct: q.correctSNS,
    pts,
    time: elapsed,
  });

  if (inp) inp.classList.add(isOk ? 'correct' : 'wrong');

  showFeedbackQ1(isOk, q.correctSNS, pts, elapsed);
}

function validateQ1B(chosen) {
  if (appState.answered) return;
  const q = appState.questions[appState.qIndex];
  const isOk = chosen === q.correct;
  const elapsed = appState.elapsed;
  stopTimer();
  appState.answered = true;

  const pts = isOk ? timeFactor(elapsed) : 0;
  appState.score += pts;
  appState.history.push({
    label: q.prompt.replace(/<[^>]+>/g, ''),
    given: chosen,
    correct: q.correct,
    pts,
    time: elapsed,
  });

  // Color buttons
  const grid = document.getElementById('choices-grid');
  if (grid) {
    grid.querySelectorAll('.choice-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.textContent.trim() === q.correct) btn.classList.add('correct');
      else if (btn.textContent.trim() === chosen && !isOk) btn.classList.add('wrong');
    });
  }

  showFeedbackQ1(isOk, q.correct, pts, elapsed);
}

function showFeedbackQ1(isOk, correct, pts, elapsed) {
  const area = document.getElementById('feedback-area');
  if (!area) return;
  area.innerHTML = `
    <div class="feedback-card ${isOk ? '' : 'wrong'}">
      <div class="feedback-title ${isOk ? 'correct-text' : 'wrong-text'}">${isOk ? '✓ Bonne réponse !' : '✗ Mauvaise réponse'}</div>
      <div class="feedback-body">
        Bonne réponse : <strong>${correct}</strong><br>
        Temps : ${elapsed.toFixed(1)} s
      </div>
      <div class="feedback-score">+ ${formatScore(pts)} pt${pts !== 1 ? 's' : ''}</div>
      <button class="btn-next" onclick="nextQuestion()">${appState.qIndex + 1 < appState.questions.length ? 'Question suivante →' : 'Voir les résultats →'}</button>
    </div>`;
}

// ============================================================
// QUIZ 2 — BUILD & PLAY
// ============================================================
function buildQuiz2Questions() {
  return pickN(SNS_DATA, 20).map(m => ({ moyen: m }));
}

function renderQuiz2Play(app) {
  const q = appState.questions[appState.qIndex];
  const total = appState.questions.length;
  appState.answered = false;
  appState.clickedLatLng = null;

  app.innerHTML = `
    <div class="header">
      <img src="${LOGO_SRC}" alt="CROSS Jobourg" style="height:40px;object-fit:contain;"><span class="header-logo">CROSS Jobourg — Module 2</span>
    </div>
    <div class="map-play-layout">
      <div class="play-topbar">
        <span class="play-progress">Question <strong>${appState.qIndex + 1} / ${total}</strong></span>
        <span class="play-score-display">Score : <strong>${formatScore(appState.score)}</strong> pts</span>
        <div class="timer-wrap">
          <div class="timer-label">Temps</div>
          <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-bar-fill" style="width:100%;background-color:rgb(46,204,60)"></div></div>
        </div>
      </div>
      <div class="map-question-bar">
        <div class="map-question-text">Cliquez sur la carte pour positionner le moyen <strong>${q.moyen.numeroSNS}</strong>${q.moyen.nom ? ' — ' + q.moyen.nom : ''}</div>
      </div>
      <div id="leaflet-map" style="flex:1;height:62vh"></div>
      <div id="feedback-area"></div>
    </div>`;

  const map = createMap('leaflet-map');

  const userIcon = L.divIcon({
    html: '<div style="background:#3a7bd5;width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,0.5)"></div>',
    iconSize: [18, 18], iconAnchor: [9, 9], className: '',
  });

  map.on('click', e => {
    if (appState.answered) return;
    appState.clickedLatLng = e.latlng;
    if (appState.clickMarker) appState.clickMarker.remove();
    appState.clickMarker = L.marker(e.latlng, {icon: userIcon}).addTo(map);
    validateQ2();
  });

  startTimer();
}

function validateQ2() {
  if (appState.answered || !appState.clickedLatLng) return;
  const q = appState.questions[appState.qIndex];
  const elapsed = appState.elapsed;
  stopTimer();
  appState.answered = true;

  const {lat, lng} = appState.clickedLatLng;
  const distKm = haversineKm(lat, lng, q.moyen.lat, q.moyen.lon);
  const geo = geoScore(distKm);
  const pts = geo * timeFactor(elapsed);
  appState.score += pts;
  appState.history.push({
    label: `${q.moyen.numeroSNS} — ${q.moyen.lieu}`,
    given: `clic à ${distKm.toFixed(1)} km`,
    correct: q.moyen.lieu,
    pts,
    time: elapsed,
  });

  const map = appState.leafletMap;
  if (map) {
    const realIcon = L.divIcon({
      html: '<div style="background:#2ecc71;width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,0.5)"></div>',
      iconSize: [18, 18], iconAnchor: [9, 9], className: '',
    });
    const realMarker = L.marker([q.moyen.lat, q.moyen.lon], {icon: realIcon})
      .bindPopup(`<strong>${q.moyen.lieu}</strong><br>${q.moyen.numeroSNS}`)
      .addTo(map);
    realMarker.openPopup();
    L.polyline([[lat, lng], [q.moyen.lat, q.moyen.lon]], {color:'#f0a500', weight:2, dashArray:'5,5'}).addTo(map);

  }

  const feedback = document.getElementById('feedback-area');
  if (feedback) {
    const isGood = distKm < 1;
    feedback.innerHTML = `
      <div class="feedback-card ${isGood ? '' : 'wrong'}" style="margin:0">
        <div class="feedback-title ${isGood ? 'correct-text' : 'wrong-text'}">${isGood ? '✓ Excellent !' : distKm < 5 ? '≈ Proche !' : '✗ Trop loin'}</div>
        <div class="feedback-body">
          Station réelle : <strong>${q.moyen.lieu}</strong><br>
          Distance : <strong>${distKm.toFixed(2)} km</strong> — Score géo : ${(geo*100).toFixed(0)} % — Temps : ${elapsed.toFixed(1)} s
        </div>
        <div class="feedback-score">+ ${formatScore(pts)} pts</div>
        <button class="btn-next" onclick="nextQuestion()">${appState.qIndex + 1 < appState.questions.length ? 'Question suivante →' : 'Voir les résultats →'}</button>
      </div>`;
  }
}

// ============================================================
// QUIZ 3 — BUILD & PLAY
// ============================================================
function buildQuiz3Questions() {
  return pickN(STATIONS, 20).map(st => ({ station: st }));
}

function renderQuiz3Play(app) {
  const q = appState.questions[appState.qIndex];
  const total = appState.questions.length;
  appState.answered = false;

  app.innerHTML = `
    <div class="header">
      <img src="${LOGO_SRC}" alt="CROSS Jobourg" style="height:40px;object-fit:contain;"><span class="header-logo">CROSS Jobourg — Module 3</span>
    </div>
    <div class="map-play-layout">
      <div class="play-topbar">
        <span class="play-progress">Question <strong>${appState.qIndex + 1} / ${total}</strong></span>
        <span class="play-score-display">Score : <strong>${formatScore(appState.score)}</strong> pts</span>
        <div class="timer-wrap">
          <div class="timer-label">Temps</div>
          <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-bar-fill" style="width:100%;background-color:rgb(46,204,60)"></div></div>
        </div>
      </div>
      <div class="map-question-bar">
        <div class="map-question-text">Quel est le numéro SNS du moyen le plus proche de ce point ?</div>
        <div class="map-hint">Saisissez le numéro ci-dessous (chiffres uniquement — plusieurs réponses possibles si station multi-moyens)</div>
      </div>
      <div id="leaflet-map" style="flex:1;height:50vh"></div>
      <div class="q3-input-area">
        <input id="sns-input" class="answer-input" type="text" inputmode="numeric" placeholder="Numéro SNS" maxlength="8" autocomplete="off" style="max-width:200px">
        <button class="btn-validate" onclick="validateQ3()">Valider</button>
      </div>
      <div id="feedback-area"></div>
    </div>`;

  const map = createMap('leaflet-map');

  const targetIcon = L.divIcon({
    html: '<div style="background:#e74c3c;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 8px rgba(0,0,0,0.6)"></div>',
    iconSize: [20, 20], iconAnchor: [10, 10], className: '',
  });
  L.marker([q.station.lat, q.station.lon], {icon: targetIcon}).addTo(map);

  const inp = document.getElementById('sns-input');
  if (inp) {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !appState.answered) validateQ3();
    });
    inp.addEventListener('input', () => {
      inp.value = inp.value.replace(/\D/g, '');
    });
    // Focus after Leaflet finishes initializing so the map doesn't capture it
    setTimeout(() => inp.focus(), 50);
  }

  startTimer();
}

function validateQ3() {
  if (appState.answered) return;
  const inp = document.getElementById('sns-input');
  const val = inp ? inp.value.trim() : '';
  const q = appState.questions[appState.qIndex];
  const elapsed = appState.elapsed;
  stopTimer();
  appState.answered = true;

  // Find the nearest station to q.station (which IS the station itself)
  // Accept all moyens from that station
  const givenNorm = normalizeSNS(val);
  const acceptedNorms = q.station.moyens.map(m => normalizeSNS(m.numeroSNS));
  const isOk = givenNorm !== '' && acceptedNorms.includes(givenNorm);

  const pts = isOk ? timeFactor(elapsed) : 0;
  appState.score += pts;

  const acceptedDisplay = q.station.moyens.map(m => m.numeroSNS).join(', ');
  appState.history.push({
    label: `Point : ${q.station.lieu}`,
    given: val || '(vide)',
    correct: acceptedDisplay,
    pts,
    time: elapsed,
  });

  // Show real station name
  const map = appState.leafletMap;
  if (map) {
    const realIcon = L.divIcon({
      html: '<div style="background:#2ecc71;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 8px rgba(0,0,0,0.6)"></div>',
      iconSize: [20, 20], iconAnchor: [10, 10], className: '',
    });
    L.marker([q.station.lat, q.station.lon], {icon: realIcon})
      .bindPopup(`<strong>${q.station.lieu}</strong><br>${acceptedDisplay}`)
      .addTo(map).openPopup();
  }

  if (inp) inp.classList.add(isOk ? 'correct' : 'wrong');

  const feedback = document.getElementById('feedback-area');
  if (feedback) {
    feedback.innerHTML = `
      <div class="feedback-card ${isOk ? '' : 'wrong'}">
        <div class="feedback-title ${isOk ? 'correct-text' : 'wrong-text'}">${isOk ? '✓ Bonne réponse !' : '✗ Mauvaise réponse'}</div>
        <div class="feedback-body">
          Station : <strong>${q.station.lieu}</strong><br>
          Réponse(s) acceptée(s) : <strong>${acceptedDisplay}</strong><br>
          Temps : ${elapsed.toFixed(1)} s
        </div>
        <div class="feedback-score">+ ${formatScore(pts)} pt${pts !== 1 ? 's' : ''}</div>
        <button class="btn-next" onclick="nextQuestion()">${appState.qIndex + 1 < appState.questions.length ? 'Question suivante →' : 'Voir les résultats →'}</button>
      </div>`;
  }
}

// ============================================================
// NEXT QUESTION
// ============================================================
function nextQuestion() {
  appState.qIndex++;
  appState.answered = false;
  if (appState.qIndex >= appState.questions.length) {
    renderScreen('result');
  } else {
    const n = appState.quizType;
    renderScreen(`quiz${n}play`);
  }
}

// ============================================================
// RESULT
// ============================================================
function renderResult(app) {
  const total = appState.questions.length;
  const maxScore = total;
  const score = appState.score;
  const pct = Math.round((score / maxScore) * 100);
  const avgTime = appState.history.length
    ? (appState.history.reduce((a, h) => a + h.time, 0) / appState.history.length).toFixed(1)
    : 0;
  const correct = appState.history.filter(h => h.pts > 0).length;

  const titles = {1:'Module 1 — Station ↔ Numéro SNS', 2:'Module 2 — SNS sur carte', 3:'Module 3 — Point côtier'};

  const rows = appState.history.map((h, i) => `
    <tr>
      <td>${i+1}</td>
      <td style="max-width:280px;word-break:break-word">${h.label}</td>
      <td>${h.given}</td>
      <td>${h.correct}</td>
      <td>${h.time.toFixed(1)} s</td>
      <td class="pts ${h.pts > 0 ? 'ok' : 'ko'}">${formatScore(h.pts)}</td>
    </tr>`).join('');

  app.innerHTML = `
    <div class="header">
      <img src="${LOGO_SRC}" alt="CROSS Jobourg" style="height:40px;object-fit:contain;"><span class="header-logo">CROSS Jobourg</span>
    </div>
    <div class="result-content">
      <div class="result-title">Résultats — ${titles[appState.quizType]}</div>
      <div class="result-sub">Quiz terminé. Voici votre performance.</div>
      <div class="result-score-big">${formatScore(score)} / ${maxScore}</div>
      <div class="result-pct">${pct} %</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-value">${correct} / ${total}</div>
          <div class="result-stat-label">Réponses justes</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${avgTime} s</div>
          <div class="result-stat-label">Temps moyen / question</div>
        </div>
      </div>
      <div class="result-table-wrap">
        <table class="result-table">
          <thead>
            <tr><th>#</th><th>Question</th><th>Réponse donnée</th><th>Bonne réponse</th><th>Temps</th><th>Pts</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="result-btns">
        <button class="btn-replay" onclick="launchQuiz(${appState.quizType})">Rejouer</button>
        <button class="btn-back-home" onclick="renderScreen('home')">← Accueil</button>
      </div>
    </div>`;
}

// ============================================================
// INIT
// ============================================================
renderScreen('home');
</script>
</body>
</html>
